<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TabTrack</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-2: #1e2530;
        --border: rgba(255,255,255,0.08);
        --text: #e6edf3;
        --muted: #7d8590;
        --primary: #4f8ef7;
        --primary-dim: rgba(79,142,247,0.12);
        --danger: #f85149;
        --danger-dim: rgba(248,81,73,0.12);
        --success: #10b981;
        --radius: 14px;
        --radius-sm: 10px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        width: 360px;
        padding: 14px;
        font-size: 13px;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .logo { display: flex; align-items: center; gap: 9px; }
      .logo-icon {
        width: 32px; height: 32px;
        border-radius: 10px;
        background: var(--primary-dim);
        border: 1px solid rgba(79,142,247,0.25);
        display: grid; place-items: center;
      }
      .logo-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 8px rgba(79,142,247,0.6);
      }
      .logo-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
      .logo-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

      /* Status pill */
      .status-pill {
        font-size: 10px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1px solid;
        letter-spacing: 0.03em;
      }
      .status-pill.on  { color: var(--success); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.1); }
      .status-pill.off { color: var(--danger);  border-color: rgba(248,81,73,0.3);  background: var(--danger-dim); }
      .status-pill.idle{ color: var(--muted);   border-color: var(--border);         background: var(--surface-2); }

      /* Active bar */
      .active-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 11px;
        margin-bottom: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .active-bar .favicon {
        width: 16px; height: 16px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .active-bar .domain { color: var(--primary); font-weight: 600; flex: 1; truncate: true; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
      .active-bar .timer { font-size: 11px; color: var(--muted); flex-shrink: 0; }

      /* Metrics */
      .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 10px; }
      .metric {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 11px;
        position: relative;
        overflow: hidden;
      }
      .metric::before {
        content: '';
        position: absolute;
        top: -8px; right: -8px;
        width: 36px; height: 36px;
        border-radius: 50%;
        opacity: 0.12;
      }
      .metric:nth-child(1)::before { background: #4f8ef7; }
      .metric:nth-child(2)::before { background: #10b981; }
      .metric:nth-child(3)::before { background: #6366f1; }
      .metric .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
      .metric .v { font-size: 18px; font-weight: 700; margin-top: 4px; }
      .metric:nth-child(1) .v { color: #4f8ef7; }
      .metric:nth-child(2) .v { color: #10b981; }
      .metric:nth-child(3) .v { color: #6366f1; }

      /* Site list */
      .sites-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 7px;
      }
      .sites-list {
        max-height: 220px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 10px;
      }
      .site-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        transition: background 0.15s;
      }
      .site-row:hover { background: var(--surface-2); }
      .site-rank { font-size: 10px; color: var(--muted); width: 14px; text-align: right; flex-shrink: 0; }
      .site-favicon { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
      .site-favicon-fallback {
        width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
        background: var(--surface-2); border: 1px solid var(--border);
        display: grid; place-items-center; font-size: 8px; font-weight: 700;
        color: var(--muted); text-align: center; line-height: 16px;
      }
      .site-info { flex: 1; min-width: 0; }
      .site-domain { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .site-sessions { font-size: 10px; color: var(--muted); margin-top: 1px; }
      .site-bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 3px; }
      .site-bar { height: 3px; border-radius: 2px; }
      .site-time { font-size: 11px; font-weight: 600; flex-shrink: 0; }

      /* Buttons */
      .btn-row { display: flex; gap: 6px; }
      .btn {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: background 0.15s;
        background: var(--surface-2);
        color: var(--text);
      }
      .btn:hover { background: #252d3a; }
      .btn.primary { background: var(--primary); color: #fff; border-color: transparent; }
      .btn.primary:hover { background: #3d7de8; }
      .btn.danger { background: var(--danger-dim); color: var(--danger); border-color: rgba(248,81,73,0.25); }
      .btn.danger:hover { background: rgba(248,81,73,0.2); }

      .empty { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon"><div class="logo-dot"></div></div>
        <div>
          <div class="logo-name">TabTrack</div>
          <div class="logo-sub">Activity Tracker</div>
        </div>
      </div>
      <div id="statusPill" class="status-pill idle">IDLE</div>
    </div>

    <!-- Active site -->
    <div class="active-bar" id="activeBar">
      <img id="activeFavicon" class="favicon" src="" alt="" style="display:none" />
      <span id="activeDomain" class="domain">No site in focus</span>
      <span id="activeTimer" class="timer"></span>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric"><div class="k">Sites</div><div id="trackedSites" class="v">0</div></div>
      <div class="metric"><div class="k">Time</div><div id="totalTime" class="v">0s</div></div>
      <div class="metric"><div class="k">Sessions</div><div id="totalSessions" class="v">0</div></div>
    </div>

    <!-- Site list -->
    <div class="sites-header">Top Sites</div>
    <div class="sites-list" id="sitesList"></div>

    <!-- Actions -->
    <div class="btn-row" style="margin-bottom:6px">
      <button class="btn primary" id="openDashboardBtn">Open Dashboard</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="refreshBtn">Refresh</button>
      <button class="btn danger" id="resetBtn">Reset Data</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
